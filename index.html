
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.screen{min-height:520px;display:flex;flex-direction:column}
.btn-primary{background:#E20074;color:#fff;border:none;padding:13px 32px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;border:0.5px solid var(--border-strong);color:var(--text-secondary);padding:10px 20px;border-radius:var(--radius);font-size:13px;cursor:pointer}
.btn-ghost:hover{background:var(--surface-1)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;color:#fff;font-size:13px}
</style>
<h2 class="sr-only">Automation CoE kickoff — Would You Rather team ice breaker</h2>
<div id="app"></div>
<script>
const NAMES=["Oliver","Renzo","Balaji","Prithviraj","Krisztián","Srikanth","Bruno","Adolfo","Nandor","Thomas","Mark","Balász","Pankaj","Istvan","Caio","Gábor","Martin"];
const COLORS=["#E20074","#32B9AF","#F59E0B","#10B981","#8B5CF6","#EF4444","#3B82F6","#EC4899","#14B8A6","#F97316","#6366F1","#22C55E","#A855F7","#06B6D4","#F43F5E","#84CC16","#0D2B5E"];
const Q=[
  {q:"You have two weeks off. Where do you go?",a:{l:"Beach",e:"🏖️",d:"Sun, sand, zero responsibilities",p:"1507525428034-b723cf961d3e"},b:{l:"Mountain",e:"⛰️",d:"Peaks, cold air, epic views",p:"1464822759023-fed622ff2c3b"}},
  {q:"When are you actually at your best?",a:{l:"Early bird",e:"🌅",d:"Up at 6am, coffee in hand, world is yours",p:"1470252649378-9c29740c9fa8"},b:{l:"Night owl",e:"🦉",d:"Midnight clarity, no meetings, pure flow",p:"1519682337058-a94d519337bc"}},
  {q:"Dinner tonight — what's the plan?",a:{l:"I cook",e:"👨‍🍳",d:"Apron on, music up, full creative control",p:"1556909114-f6e7ad7d3136"},b:{l:"Others cook",e:"🍽️",d:"Table set, someone brings it to you",p:"1414235077428-338989a2e8c0"}},
  {q:"Friday evening — what are you watching?",a:{l:"New series",e:"📺",d:"Something fresh, unknown, risky",p:"1522869635100-9f4c5e86aa37"},b:{l:"Classic movie",e:"🎬",d:"One you've seen 10 times and still love",p:"1489599849927-2ee91cede3ba"}},
  {q:"Hard problem to solve — what's your soundtrack?",a:{l:"Music on",e:"🎧",d:"Headphones in, world out",p:"1511671782779-c97d3d27a1d4"},b:{l:"Total silence",e:"🤫",d:"Every sound is a distraction",p:"1448375240586-882707db888b"}},
  {q:"Something is bothering you — how do you process it?",a:{l:"Talk it out",e:"💬",d:"Thinking out loud with someone helps",p:"1517245386807-bb43f82c33c4"},b:{l:"Think alone first",e:"🧠",d:"Need to process solo before talking",p:"1506126613408-eca07ce68773"}},
  {q:"Every morning — non-negotiable:",a:{l:"Coffee",e:"☕",d:"No coffee, no me. Full stop.",p:"1509042239860-f550ce710b93"},b:{l:"Tea",e:"🍵",d:"Slow, warm, civilised.",p:"1544787219-7f47ccb76574"}},
  {q:"What season makes you genuinely happy?",a:{l:"Summer",e:"☀️",d:"Heat, light, long evenings outside",p:"1530053969600-caed2596d242"},b:{l:"Winter",e:"❄️",d:"Cold outside, warm inside",p:"1491555103944-7c647fd857e6"}},
  {q:"Weekend recharge — where do you feel most yourself?",a:{l:"City life",e:"🏙️",d:"Streets, noise, something always happening",p:"1477959858617-67f85cf4f1df"},b:{l:"Nature",e:"🌿",d:"Trees, open space, silence",p:"1441974231531-c6227db76b6e"}},
  {q:"New project — how do you approach the unknown?",a:{l:"Plan everything",e:"📋",d:"Itinerary, checklist, contingency plan",p:"1484480974693-6ca0a78fb36b"},b:{l:"Improvise",e:"🎲",d:"Book the flight, figure the rest out there",p:"1527529482837-4698179dc6ce"}}
];
const KEY="coe_kickoff_2026_v2";
function imgUrl(id){return`https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=700&h=500&q=75`;}
function getColor(name){const i=NAMES.indexOf(name);return COLORS[i>=0?i%COLORS.length:0];}
function initial(name){return name[0].toUpperCase();}
function avatarHTML(name,size){return`<div class="avatar" style="width:${size}px;height:${size}px;background:${getColor(name)};font-size:${Math.round(size*.38)}px">${initial(name)}</div>`;}

let state={phase:"intro",myName:null,myAnswers:[],currentQ:0,allData:{}};

async function loadData(){
  try{const r=await window.storage.get(KEY,true);if(r){state.allData=JSON.parse(r.value);}}catch(e){}
}
async function saveAnswers(name,answers){
  try{
    let cur={};
    try{const r=await window.storage.get(KEY,true);if(r)cur=JSON.parse(r.value);}catch(e){}
    cur[name]=answers;
    await window.storage.set(KEY,JSON.stringify(cur),true);
    state.allData=cur;
  }catch(e){}
}

function answeredNames(){return Object.keys(state.allData);}

function render(){
  const app=document.getElementById("app");
  switch(state.phase){
    case"intro":app.innerHTML=renderIntro();break;
    case"names":app.innerHTML=renderNames();break;
    case"question":app.innerHTML=renderQuestion();break;
    case"profile":app.innerHTML=renderProfile();break;
    case"poster":app.innerHTML=renderPoster();break;
  }
  bindEvents();
}

function renderIntro(){
  const cnt=answeredNames().length;
  return`<div class="screen" style="align-items:center;justify-content:center;text-align:center;padding:32px 24px;background:linear-gradient(160deg,#0D2B5E,#102240);border-radius:16px;min-height:480px">
    <div style="font-size:48px;line-height:1;margin-bottom:14px">⚡</div>
    <div style="font-size:11px;letter-spacing:3px;color:#E20074;font-weight:500;text-transform:uppercase;margin-bottom:8px">Automation CoE · Kickoff 2026</div>
    <h1 style="font-size:28px;font-weight:500;color:#fff;margin-bottom:10px;letter-spacing:-.5px">Who are we?</h1>
    <p style="color:#94a3b8;font-size:14px;line-height:1.7;max-width:320px;margin-bottom:28px">Before we talk automation, let's talk about <em>us</em>.<br>10 quick questions — no right answers,<br>just your honest choices.</p>
    ${cnt>0?`<div style="background:rgba(50,185,175,.12);border:0.5px solid rgba(50,185,175,.35);border-radius:8px;padding:7px 16px;margin-bottom:18px;font-size:13px;color:#32B9AF">✓ ${cnt} of 17 team members have answered</div>`:""}
    <button class="btn-primary" data-action="go-names">Let's go →</button>
    ${cnt>=2?`<br><br><button class="btn-ghost" data-action="go-poster" style="color:#64748b;border-color:rgba(255,255,255,.15)">👥 View team poster (${cnt}/17)</button>`:""}
  </div>`;
}

function renderNames(){
  const ans=answeredNames();
  const items=NAMES.map(n=>{
    const done=ans.includes(n);
    return`<button data-action="select-name" data-name="${n}" style="background:${done?"rgba(50,185,175,.1)":"rgba(255,255,255,.05)"};border:0.5px solid ${done?"rgba(50,185,175,.4)":"var(--border)"};border-radius:10px;padding:10px 8px;display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:500;color:${done?"#32B9AF":"var(--text-primary)"};justify-content:center">
      ${avatarHTML(n,26)}${n}${done?` <span style="font-size:10px">✓</span>`:""}
    </button>`;
  }).join("");
  return`<div class="screen" style="padding:20px;background:var(--surface-1);border-radius:16px;min-height:480px">
    <div style="text-align:center;margin-bottom:18px">
      <h2 style="font-size:18px;font-weight:500;margin-bottom:4px">Who are you?</h2>
      <p style="color:var(--text-muted);font-size:13px">${ans.length===0?"Tap your name to start":`${ans.length}/17 answered — tap your name`}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px">${items}</div>
    ${ans.length>=2?`<div style="text-align:center"><button class="btn-ghost" data-action="go-poster" style="color:#E20074;border-color:rgba(226,0,116,.3)">👥 See team poster (${ans.length}/17)</button></div>`:""}
  </div>`;
}

function renderQuestion(){
  const q=Q[state.currentQ];
  const prog=Math.round((state.currentQ/Q.length)*100);
  const opts=[q.a,q.b];
  return`<div class="screen" style="position:relative;border-radius:16px;overflow:hidden;min-height:480px">
    <div style="position:absolute;top:0;left:0;right:0;z-index:20;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        ${avatarHTML(state.myName,26)}
        <span style="color:rgba(255,255,255,.85);font-size:12px;font-weight:500">${state.myName}</span>
        <span style="margin-left:auto;color:rgba(255,255,255,.45);font-size:12px">${state.currentQ+1}/${Q.length}</span>
      </div>
      <div style="height:3px;background:rgba(255,255,255,.15);border-radius:2px"><div style="height:100%;background:#E20074;border-radius:2px;width:${prog}%;transition:width .35s"></div></div>
    </div>
    <div style="position:absolute;top:64px;left:0;right:0;z-index:20;text-align:center;padding:0 20px">
      <p style="color:#fff;font-size:clamp(13px,2.5vw,16px);font-weight:500;text-shadow:0 2px 10px rgba(0,0,0,.9);line-height:1.35">${q.q}</p>
    </div>
    <div style="display:flex;height:100%;min-height:480px;margin-top:0">
      ${opts.map((o,i)=>`<div data-action="answer" data-choice="${i}" style="flex:1;position:relative;cursor:pointer;overflow:hidden;${i===1?"border-left:1.5px solid rgba(255,255,255,.2)":""}">
        <img src="${imgUrl(o.p)}" alt="${o.l}" style="width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.48);transition:filter .2s;min-height:480px" onmouseover="this.style.filter='brightness(.65)'" onmouseout="this.style.filter='brightness(.48)'">
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:44px 14px 20px;text-align:center">
          <div style="font-size:clamp(26px,6vw,40px);margin-bottom:5px;line-height:1">${o.e}</div>
          <div style="color:#fff;font-weight:500;font-size:clamp(14px,3.5vw,19px);margin-bottom:3px">${o.l}</div>
          <div style="color:rgba(255,255,255,.55);font-size:clamp(10px,2vw,12px);line-height:1.3">${o.d}</div>
        </div>
      </div>`).join("")}
    </div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);color:rgba(255,255,255,.35);padding:4px 11px;border-radius:20px;font-size:10px;pointer-events:none;z-index:10;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;margin-top:20px">tap to choose</div>
  </div>`;
}

function renderProfile(){
  const ans=state.myAnswers;
  const allD=state.allData;
  const matches=NAMES.filter(n=>n!==state.myName&&allD[n]&&allD[n].length===Q.length)
    .map(n=>({name:n,score:ans.filter((v,i)=>v===allD[n][i]).length}))
    .sort((a,b)=>b.score-a.score).slice(0,3);
  const chips=ans.map((a,i)=>{const o=a===0?Q[i].a:Q[i].b;return`<span style="background:var(--surface-0);border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;display:inline-flex;align-items:center;gap:5px;font-size:12px">${o.e}<span style="color:var(--text-secondary)">${o.l}</span></span>`;}).join("");
  const matchHTML=matches.length>0?`<div style="background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:12px;padding:14px 16px;margin-bottom:16px">
    <p style="font-size:11px;color:var(--text-accent);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Most in common with</p>
    ${matches.map(m=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${avatarHTML(m.name,32)}<span style="flex:1;font-size:13px;font-weight:500">${m.name}</span><span style="background:var(--surface-1);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text-accent)">${m.score}/10</span></div>`).join("")}
  </div>`:"";
  const cnt=Object.keys(allD).length;
  return`<div class="screen" style="padding:20px;background:var(--surface-1);border-radius:16px;min-height:480px">
    <div style="text-align:center;padding-top:16px;margin-bottom:20px">
      <div style="display:flex;justify-content:center">${avatarHTML(state.myName,56)}</div>
      <h2 style="font-size:20px;font-weight:500;margin:10px 0 3px">${state.myName}</h2>
      <p style="color:var(--text-muted);font-size:13px">Your choices</p>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:22px">${chips}</div>
    ${matchHTML}
    <button class="btn-primary" data-action="go-poster" style="width:100%;margin-bottom:10px">👥 See team poster · ${cnt}/17</button>
    <button class="btn-ghost" data-action="go-names" style="width:100%;font-size:13px">← Back</button>
  </div>`;
}

function renderPoster(){
  const allD=state.allData;
  const cnt=Object.keys(allD).length;
  const allAnswered=cnt===17;
  const popChoices=Q.map((q,i)=>{
    const av=NAMES.filter(n=>allD[n]&&allD[n][i]===0).length;
    const bv=NAMES.filter(n=>allD[n]&&allD[n][i]===1).length;
    return av>=bv?q.a:q.b;
  });
  const cards=NAMES.map(n=>{
    const ans=allD[n];
    return`<div style="background:${ans?"var(--surface-2)":"var(--surface-0)"};border:0.5px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center">
      <div style="display:flex;justify-content:center;margin-bottom:7px">${avatarHTML(n,40)}</div>
      <div style="font-size:11px;font-weight:500;color:${ans?"var(--text-primary)":"var(--text-muted)"};margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n}</div>
      ${ans?`<div style="display:flex;flex-wrap:wrap;gap:1px;justify-content:center">${ans.map((a,i)=>{const o=a===0?Q[i].a:Q[i].b;return`<span title="${o.l}" style="font-size:11px">${o.e}</span>`;}).join("")}</div>`:`<div style="color:var(--text-muted);font-size:10px">not yet</div>`}
    </div>`;
  }).join("");
  const vibeChips=cnt>=3?`<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:6px">${popChoices.map(o=>`<span style="background:var(--surface-0);border:0.5px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text-muted)">${o.e} ${o.l}</span>`).join("")}</div><p style="color:var(--text-muted);font-size:11px;margin-bottom:18px">most popular choices across the team</p>`:"";
  return`<div class="screen" style="padding:20px;min-height:520px">
    <div style="text-align:center;padding-bottom:16px">
      <div style="font-size:10px;letter-spacing:3px;color:#E20074;font-weight:500;text-transform:uppercase;margin-bottom:6px">T-Systems · Automation CoE</div>
      <h1 style="font-size:26px;font-weight:500;letter-spacing:-.5px;margin-bottom:3px">Founding Team</h1>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">2026 · ${cnt}/17 answered</p>
      ${vibeChips}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;margin-bottom:20px">${cards}</div>
    <div style="background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px">
      <div style="font-size:24px;margin-bottom:8px">🌍 ⚡ 🤝</div>
      <p style="font-size:14px;font-weight:500;line-height:1.5;color:var(--text-primary);margin-bottom:4px">Different countries. Different tastes.</p>
      <p style="font-size:17px;font-weight:500;color:#E20074">${allAnswered?"All 17 founding members. One team. ✓":"Same mindset. One team."}</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" data-action="refresh" style="flex:1">↻ Refresh</button>
      <button class="btn-ghost" data-action="go-names" style="flex:1">← Back</button>
    </div>
  </div>`;
}

function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",async e=>{
      const a=el.dataset.action;
      if(a==="go-names"){state.phase="names";render();}
      else if(a==="go-poster"){await loadData();state.phase="poster";render();}
      else if(a==="refresh"){await loadData();render();}
      else if(a==="select-name"){
        const n=el.dataset.name;state.myName=n;
        if(state.allData[n]){state.myAnswers=state.allData[n];state.phase="profile";}
        else{state.currentQ=0;state.myAnswers=[];state.phase="question";}
        render();
      }
      else if(a==="answer"){
        if(el._clicked)return;el._clicked=true;
        const choice=parseInt(el.dataset.choice);
        const newAns=[...state.myAnswers,choice];
        state.myAnswers=newAns;
        if(newAns.length<Q.length){state.currentQ=newAns.length;render();}
        else{await saveAnswers(state.myName,newAns);state.phase="profile";render();}
      }
    });
  });
}

loadData().then(()=>render());
</script>
