<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAS Automation CoE - Kickoff</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b2340 0%,#0b0f1c 60%);
    color:#e8ecf4; min-height:100vh; padding:22px 16px 40px;
  }
  .wrap { max-width:1080px; margin:0 auto; }
  header { text-align:center; margin-bottom:22px; }
  .brand { display:inline-flex; align-items:center; gap:10px; font-size:12px; letter-spacing:3px;
    text-transform:uppercase; color:#E20074; font-weight:800; }
  .brand .dot { width:8px; height:8px; border-radius:50%; background:#E20074; box-shadow:0 0 12px #E20074; }
  h1 { font-size:30px; font-weight:800; margin:8px 0 4px; letter-spacing:-.5px; }
  h1 span { color:#32B9AF; }
  .sub { color:#9aa6bd; font-size:14px; }
  .bar { max-width:520px; margin:16px auto 0; height:8px; background:rgba(255,255,255,.08);
    border-radius:8px; overflow:hidden; }
  .bar > div { height:100%; width:0; background:linear-gradient(90deg,#E20074,#32B9AF); transition:width .5s; }
  .bar-label { text-align:center; font-size:12px; color:#9aa6bd; margin-top:8px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-top:22px; }
  .card { position:relative; background:#141a2e; border:1px solid rgba(255,255,255,.08);
    border-radius:16px; padding:16px 12px; text-align:center; transition:all .15s; overflow:hidden; }
  .card.in { border-color:rgba(50,185,175,.5); box-shadow:0 0 0 1px rgba(50,185,175,.25),0 8px 24px rgba(50,185,175,.08); }
  .card.absent { opacity:.42; }
  .flag-lg { display:block; margin:0 auto 8px; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  .flag-fallback { display:inline-flex; align-items:center; justify-content:center;
    background:#20284a; border:1px solid rgba(255,255,255,.14); border-radius:4px;
    font-weight:700; color:#cfd6e4; letter-spacing:1px; }
  .card-name { font-weight:700; font-size:15px; margin-bottom:2px; }
  .card-country { font-size:11px; color:#8b97af; }
  .check { position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%;
    background:#32B9AF; color:#06231f; font-size:12px; font-weight:900; display:none;
    align-items:center; justify-content:center; }
  .card.in .check { display:flex; }
  .me-tag { position:absolute; top:8px; left:8px; font-size:9px; font-weight:800; letter-spacing:1px;
    text-transform:uppercase; color:#E20074; background:rgba(226,0,116,.12); padding:2px 6px; border-radius:20px; }
  .absent-tag { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); font-size:9px;
    font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#c98; }
  .mark-absent { position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    font-size:9px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    padding:3px 9px; border-radius:20px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); color:#9aa6bd; cursor:pointer; white-space:nowrap; }
  .mark-absent:hover { background:rgba(226,0,116,.16); border-color:rgba(226,0,116,.5); color:#fff; }
  .mark-absent.is-absent { background:rgba(201,153,136,.16); border-color:rgba(201,153,136,.55); color:#f0c9b8; }
  .card.has-mark { padding-bottom:34px; }
  .m-absent-tag { font-size:9px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    color:#e0b48f; background:rgba(201,153,136,.14); border:1px solid rgba(201,153,136,.35);
    border-radius:20px; padding:1px 7px; margin-left:6px; }

  .actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:26px; }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:12px; font-weight:700;
    font-size:14px; padding:13px 26px; transition:all .15s; }
  .btn-primary { background:linear-gradient(90deg,#E20074,#ff3d9a); color:#fff;
    box-shadow:0 8px 24px rgba(226,0,116,.35); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(226,0,116,.5); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost { background:rgba(255,255,255,.06); color:#e8ecf4; border:1px solid rgba(255,255,255,.14); }
  .btn-ghost:hover { background:rgba(255,255,255,.12); }
  .btn-teal { background:linear-gradient(90deg,#32B9AF,#4fe3d7); color:#06231f;
    box-shadow:0 8px 24px rgba(50,185,175,.3); }
  .btn-teal:hover { transform:translateY(-2px); }
  .btn-sm { padding:9px 16px; font-size:12px; }

  .hint { text-align:center; color:#7d8aa3; font-size:12px; margin-top:14px; }
  .pick-note { text-align:center; color:#32B9AF; font-size:13px; margin-top:6px; font-weight:600; }

  /* Presentations */
  .stage { max-width:640px; margin:10px auto 0; text-align:center; }
  .now { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:#E20074; font-weight:800; }
  .stage-card { background:#141a2e; border:1px solid rgba(255,255,255,.1); border-radius:24px;
    padding:34px 26px; margin-top:14px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  .stage-flag { border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,.5); margin-bottom:14px; }
  .stage-name { font-size:34px; font-weight:800; letter-spacing:-.5px; }
  .stage-country { font-size:15px; color:#9aa6bd; margin-top:4px; }
  .timer { font-size:64px; font-weight:800; font-variant-numeric:tabular-nums; margin:18px 0 4px; transition:color .3s; }
  .timer-ring { height:10px; background:rgba(255,255,255,.08); border-radius:8px; overflow:hidden; margin:6px auto 0; max-width:420px; }
  .timer-ring > div { height:100%; width:100%; border-radius:8px; transition:width 1s linear,background .3s; }
  .queue { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:22px; }
  .chip { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:5px 12px; font-size:12px; color:#b9c2d6; }
  .chip.done { opacity:.5; }
  .chip.current { border-color:#E20074; color:#fff; background:rgba(226,0,116,.14); }
  .absent-bar { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
  .absent-chip { font-size:11px; color:#8b97af; background:rgba(255,255,255,.04);
    border:1px dashed rgba(255,255,255,.16); border-radius:20px; padding:4px 10px; }

  /* Intro done / celebration */
  .celebrate { text-align:center; padding:20px; }
  .celebrate .big { font-size:64px; margin-bottom:8px; }
  .celebrate h2 { font-size:30px; margin-bottom:8px; }
  .celebrate p { color:#9aa6bd; max-width:520px; margin:0 auto 18px; }

  /* Quiz */
  .quiz-wrap { max-width:680px; margin:0 auto; }
  .q-num { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#E20074; font-weight:800; margin-bottom:10px; text-align:center; }
  .q-card { background:#141a2e; border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:26px 22px; text-align:center; }
  .q-title { font-size:22px; font-weight:800; margin-bottom:20px; line-height:1.3; }
  .q-opts { display:grid; gap:10px; }
  .q-opt { display:flex; align-items:center; gap:12px; text-align:left; background:#1a2136;
    border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:14px 16px; cursor:pointer;
    font-size:15px; color:#e8ecf4; transition:all .12s; }
  .q-opt:hover { border-color:#E20074; background:#20284a; transform:translateY(-1px); }
  .q-emoji { font-size:24px; line-height:1; }
  .pillar-opt { flex-direction:column; align-items:flex-start; gap:4px; }
  .pillar-opt .p-head { display:flex; align-items:center; gap:10px; font-weight:700; }
  .pillar-opt .p-sub { font-size:12px; color:#9aa6bd; padding-left:34px; }
  .q-progress { height:6px; background:rgba(255,255,255,.1); border-radius:4px; margin:16px auto 0;
    max-width:680px; overflow:hidden; }
  .q-progress > div { height:100%; background:linear-gradient(90deg,#E20074,#32B9AF); border-radius:4px; transition:width .3s; }
  .q-back { text-align:center; margin-top:14px; }
  .wait-card { max-width:520px; margin:0 auto; text-align:center; background:#141a2e;
    border:1px solid rgba(50,185,175,.3); border-radius:20px; padding:34px 24px; }
  .wait-emoji { font-size:52px; margin-bottom:10px; }
  .wait-card h2 { font-size:24px; margin-bottom:8px; }
  .wait-card p { color:#9aa6bd; }
  .admin-panel { max-width:680px; margin:18px auto 0; background:rgba(226,0,116,.07);
    border:1px solid rgba(226,0,116,.22); border-radius:16px; padding:16px; text-align:center; }
  .admin-panel .ap-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#E20074; font-weight:800; margin-bottom:8px; }
  .admin-panel .ap-progress { font-size:14px; color:#cfd6e4; margin-bottom:12px; }
  .admin-panel .ap-progress b { color:#32B9AF; }

  /* Would-you-rather split */
  .quiz-qtext { text-align:center; font-size:clamp(17px,3vw,23px); font-weight:800; margin:0 auto 14px;
    max-width:600px; line-height:1.3; }
  .quiz-split { display:flex; height:min(440px,58vh); border-radius:18px; overflow:hidden;
    border:1px solid rgba(255,255,255,.1); position:relative; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .qpane { flex:1; position:relative; cursor:pointer; overflow:hidden; }
  .qpane + .qpane { border-left:2px solid rgba(255,255,255,.18); }
  .qpane-bg { position:absolute; inset:0; }
  .qpane-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    filter:brightness(.5); transition:filter .25s,transform .4s,opacity .3s; }
  .qpane:hover .qpane-img { filter:brightness(.74); transform:scale(1.05); }
  .qpane-content { position:absolute; left:0; right:0; bottom:0; padding:44px 14px 22px; text-align:center;
    background:linear-gradient(transparent,rgba(0,0,0,.9)); pointer-events:none; }
  .qpane-emoji { font-size:clamp(34px,6vw,46px); line-height:1; margin-bottom:8px; }
  .qpane-label { color:#fff; font-weight:800; font-size:clamp(16px,3.4vw,21px); margin-bottom:4px; }
  .qpane-desc { color:rgba(255,255,255,.62); font-size:clamp(10px,2vw,12px); line-height:1.35; }
  .qpane-vs { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5;
    background:#E20074; color:#fff; width:46px; height:46px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-weight:800; font-size:13px; letter-spacing:1px;
    box-shadow:0 6px 18px rgba(0,0,0,.55); border:2px solid rgba(255,255,255,.25); pointer-events:none; }
  .tap-hint { text-align:center; color:#7d8aa3; font-size:11px; letter-spacing:1px;
    text-transform:uppercase; margin-top:12px; }

  /* Groups */
  .groups { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; margin:8px 0 22px; }
  .group-card { background:#141a2e; border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:18px; }
  .group-card.g0 { border-top:3px solid #E20074; }
  .group-card.g1 { border-top:3px solid #32B9AF; }
  .group-card.g2 { border-top:3px solid #f5a524; }
  .group-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .group-title { font-size:17px; font-weight:800; }
  .group-tz { font-size:11px; color:#9aa6bd; text-align:right; }
  .member { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid rgba(255,255,255,.06); }
  .member:first-of-type { border-top:none; }
  .m-info { display:flex; flex-direction:column; }
  .m-name { font-weight:600; font-size:14px; }
  .m-country { font-size:11px; color:#8b97af; }
  .m-tz { margin-left:auto; font-size:10px; color:#9aa6bd; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:2px 8px; }
  .pillars { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
  .pbadge { font-size:10px; padding:3px 9px; border-radius:20px; border:1px solid rgba(255,255,255,.14); color:#7d8aa3; }
  .pbadge.on { color:#32B9AF; border-color:rgba(50,185,175,.4); background:rgba(50,185,175,.08); }
  .coord { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:4px 0 20px; }
  .coord-card { display:flex; align-items:center; gap:10px; background:rgba(226,0,116,.08);
    border:1px solid rgba(226,0,116,.25); border-radius:14px; padding:10px 16px; }
  .coord-name { font-weight:700; font-size:14px; }
  .coord-role { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#E20074; font-weight:800; }
  .section-label { text-align:center; font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:#9aa6bd; font-weight:700; margin:6px 0 12px; }

  /* T-Systems logo (shown on every phase via the persistent header) */
  .ts-logo { display:block; height:30px; width:auto; margin:0 auto 12px;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.5)); }

  /* Quiz meme panes – show the whole meme, keep it bright */
  .qpane-meme { object-fit:contain !important; filter:none !important; background:#0b0f1c; }

  /* CSS-only quiz panes (instant, no network image) */
  .qpane-css .qpane-content { top:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(rgba(0,0,0,.10),rgba(0,0,0,.42)); padding:20px 16px; }
  .qpane-css .qpane-emoji { font-size:clamp(54px,12vw,88px); margin-bottom:12px; filter:drop-shadow(0 6px 18px rgba(0,0,0,.55)); }

  /* Pillar picker – more playful */
  .pillar-opt { padding:16px; border-radius:14px; transition:transform .12s,box-shadow .12s,background .12s; }
  .pillar-opt:hover { transform:translateY(-2px); box-shadow:0 12px 26px rgba(0,0,0,.4); }
  .pillar-opt .p-head { font-size:15px; }
  .pillar-opt .p-sub { line-height:1.45; }

  /* Per-member pillar mark inside a squad + pillar split summary */
  .m-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
  .m-right .m-tz { margin-left:0; }
  .m-pill { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:22px;
    padding:0 4px; border-radius:8px; border:1px solid rgba(255,255,255,.16); font-size:13px; line-height:1; }
  .m-pill-none { color:#5f6b83; }
  .pillar-split-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#7d8aa3;
    margin:14px 0 6px; text-align:center; }
  .pbadge b { font-weight:800; }

  /* Team-wide pillar coverage banner (groups view) */
  .coverage { max-width:760px; margin:0 auto 18px; border-radius:16px; padding:14px 16px; text-align:center;
    border:1px solid rgba(255,255,255,.12); background:#141a2e; }
  .coverage.cov-ok { border-color:rgba(50,185,175,.45); background:rgba(50,185,175,.09); }
  .coverage.cov-warn { border-color:rgba(245,165,36,.55); background:rgba(245,165,36,.11); }
  .cov-head { font-size:13px; font-weight:800; margin-bottom:10px; letter-spacing:.3px; }
  .cov-badges { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .cov-badge { font-size:11px; padding:4px 11px; border-radius:20px; border:1px solid rgba(255,255,255,.14);
    color:#7d8aa3; white-space:nowrap; }
  .cov-badge b { font-weight:800; }
  .cover-note { font-size:11px; font-weight:700; margin-top:10px; text-align:center; border-radius:10px; padding:6px 10px; }
  .cover-note.ok { color:#7ee0b8; background:rgba(50,185,175,.12); border:1px solid rgba(50,185,175,.3); }
  .cover-note.miss { color:#f0c17a; background:rgba(245,165,36,.12); border:1px solid rgba(245,165,36,.35); }
  .pillar-hint { font-size:12px; color:#32B9AF; font-weight:700; text-align:center; margin-top:14px;
    background:rgba(50,185,175,.08); border:1px solid rgba(50,185,175,.25); border-radius:12px; padding:10px 12px; }
</style>

/* Verify unlock password against stored hash */
function verifyHostPassword(entered){
  return new Promise(function(resolve){
    try {
      var msgBuffer = new TextEncoder().encode(entered);
      crypto.subtle.digest("SHA-256", msgBuffer).then(function(hashBuffer){
        var hashArray = Array.from(new Uint8Array(hashBuffer));
        var hashHex = hashArray.map(function(b){ return ("0" + b.toString(16)).slice(-2); }).join("");
        resolve(hashHex === HOST_UNLOCK_HASH);
      });
    } catch(e){
      resolve(false);
    }
  });
}

function defaultState(){

  return {
    checkedIn: s.checkedIn || [],
    absent:    s.absent || [],

    currentIndex: s.currentIndex || 0,
    startedAt: s.startedAt || null,

/* ---------------- Realtime sync (MQTT over WebSockets) ----------------
   Uses a public MQTT broker with a RETAINED message so every device – anywhere
   in the world – instantly receives the current session state on connect and on
   every change. localStorage remains an offline / same-device fallback only. */
var realtime = { enabled:false, client:null, topic:null };
var MQTT_BROKERS = [
  "wss://broker.emqx.io:8084/mqtt",
  "wss://broker.hivemq.com:8884/mqtt",
  "wss://test.mosquitto.org:8081/mqtt"
];
var mqttBrokerIdx = 0;

function currentRoom(){
  return (new URLSearchParams(window.location.search).get("room") || "coe-kickoff-default");
}

function setSyncStatus(state){
  var el = document.getElementById("syncBadge");
  if(!el){
    el = document.createElement("div");
    el.id = "syncBadge";
    el.style.cssText = "position:fixed;top:10px;right:12px;z-index:9999;font-size:11px;font-weight:800;"+
      "padding:5px 10px;border-radius:999px;letter-spacing:.5px;font-family:inherit;pointer-events:none;";
    document.body.appendChild(el);
  }
  if(state==="live"){
    el.textContent = "\u25CF LIVE";
    el.style.background = "rgba(50,185,175,.15)";
    el.style.color = "#32B9AF";
    el.style.border = "1px solid rgba(50,185,175,.45)";
  } else if(state==="offline"){
    el.textContent = "\u25CF OFFLINE";
    el.style.background = "rgba(226,0,116,.12)";
    el.style.color = "#ff6ab5";
    el.style.border = "1px solid rgba(226,0,116,.4)";
  } else {
    el.textContent = "\u25CF CONNECTING\u2026";
    el.style.background = "rgba(245,165,36,.12)";
    el.style.color = "#f0c17a";
    el.style.border = "1px solid rgba(245,165,36,.35)";
  }
}

function initRealtime(){
  try {
    realtime.topic = "eas/coe/kickoff/" + currentRoom() + "/state";
    waitForMqtt(0);
  } catch(e){ setSyncStatus("offline"); }
}

/* The MQTT library may still be loading from the CDN (or a fallback CDN) when we boot.
   Poll briefly until it's available, then connect. */
function waitForMqtt(attempt){
  if(typeof mqtt !== "undefined"){ connectMqtt(); return; }
  if(attempt > 40){ setSyncStatus("offline"); return; }   /* ~20s max */
  setSyncStatus("connecting");
  setTimeout(function(){ waitForMqtt(attempt+1); }, 500);
}

/* True when the shared state carries no session data yet (safe to overwrite / not worth seeding). */
function isDefaultState(s){
  if(!s) return true;
  return (!s.checkedIn || s.checkedIn.length===0) &&
         (!s.absent   || s.absent.length===0) &&
         (s.phase==="checkin") &&
         (!s.quiz   || Object.keys(s.quiz).length===0) &&
         (!s.groups || s.groups.length===0);
}

function connectMqtt(){
  var broker = MQTT_BROKERS[mqttBrokerIdx % MQTT_BROKERS.length];
  var clientId = "coe_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  var client;
  try {
    client = mqtt.connect(broker, {
      clientId: clientId,
      keepalive: 30,
      reconnectPeriod: 0,      /* we handle broker failover manually */
      connectTimeout: 7000,
      clean: true
    });
  } catch(e){ tryNextBroker(); return; }
  realtime.client = client;

  var settled = false;
  client.on("connect", function(){
    settled = true;
    realtime.enabled = true;
    setSyncStatus("live");
    /* Subscribe – the broker immediately delivers the RETAINED state (if any). */
    var stamp = realtime.lastIncomingAt || 0;
    client.subscribe(realtime.topic, { qos: 0 }, function(){
      /* If no retained state arrives shortly and we already hold real data
         (e.g. the host set up before the broker was reachable), seed the broker. */
      setTimeout(function(){
        var gotRetained = (realtime.lastIncomingAt || 0) > stamp;
        if(!gotRetained && !isDefaultState(sharedState)){
          publishRealtime(JSON.stringify(sharedState));
        }
      }, 1200);
    });
  });
  client.on("message", function(topic, payload){
    if(topic !== realtime.topic) return;
    realtime.lastIncomingAt = Date.now();
    try { applyIncomingSharedRaw(payload.toString()); } catch(e){}
  });
  client.on("close",   function(){ realtime.enabled = false; setSyncStatus("connecting"); if(!settled) tryNextBroker(); });
  client.on("offline", function(){ realtime.enabled = false; setSyncStatus("connecting"); });
  client.on("error",   function(){ realtime.enabled = false; try{ client.end(true); }catch(e){} if(!settled) tryNextBroker(); });

  /* Manual reconnect loop: if the socket drops after connecting, retry same broker. */
  client.on("close", function(){
    if(settled){ setTimeout(function(){ if(!realtime.enabled) connectMqtt(); }, 2500); }
  });
}

function tryNextBroker(){
  mqttBrokerIdx++;
  if(mqttBrokerIdx < MQTT_BROKERS.length * 3){
    setTimeout(connectMqtt, 1500);
  } else {
    setSyncStatus("offline");
  }
}

function publishRealtime(raw){
  try {
    if(realtime.enabled && realtime.client && realtime.topic){
      /* retain:true => new / returning devices get the latest state the moment they subscribe. */
      realtime.client.publish(realtime.topic, raw, { retain:true, qos:0 });
    }
  } catch(e){}
}

/* Apply incoming shared state from any source (realtime, localStorage, or backend).
   Conflict handling:
   - Last-write-wins by updatedAt for host-driven fields (phase, order, etc.).
   - quiz answers are merged per-name so simultaneous submissions are never lost.
   - a device re-asserts its OWN check-in if a concurrent update accidentally dropped it. */
function applyIncomingSharedRaw(raw){
  if(!raw) return;
  var incoming;
  try { incoming = normalizeState(JSON.parse(raw)); } catch(e){ return; }

  /* Ignore stale updates; nudge the stale sender back to our newer state. */
  if(incoming.updatedAt && sharedState.updatedAt && incoming.updatedAt < sharedState.updatedAt){
    if(JSON.stringify(incoming) !== JSON.stringify(sharedState)) publishRealtime(JSON.stringify(sharedState));
    return;
  }

  /* Merge quiz answers by name so nobody's submission is clobbered. */
  var mergedQuiz = {}, k;
  for(k in sharedState.quiz){ if(sharedState.quiz.hasOwnProperty(k)) mergedQuiz[k] = sharedState.quiz[k]; }
  for(k in incoming.quiz){ if(incoming.quiz.hasOwnProperty(k)) mergedQuiz[k] = incoming.quiz[k]; }
  incoming.quiz = mergedQuiz;

  /* Re-assert my own presence if a concurrent write dropped me. */
  var me = deviceState.myName, selfReadded = false;
  if(me && sharedState.checkedIn.indexOf(me)!==-1 &&
     incoming.checkedIn.indexOf(me)===-1 && incoming.absent.indexOf(me)===-1){
    incoming.checkedIn = incoming.checkedIn.concat([me]);
    selfReadded = true;
  }

  if(JSON.stringify(incoming) === JSON.stringify(sharedState)) return;
  sharedState = incoming;
  if(selfReadded){
    sharedState.updatedAt = Date.now();
    var raw2 = JSON.stringify(sharedState);
    try { if(hasBackend()) window.storage.setItem(SHARED_KEY, raw2); } catch(e){}
    try { localStorage.setItem(SHARED_KEY, raw2); } catch(e){}
    publishRealtime(raw2);
  }
  render();
}

function memberByName(n){ for(var i=0;i<TEAM.length;i++){ if(TEAM[i].name===n) return TEAM[i]; } return null; }

function tzOf(name){ var m=memberByName(name); return m ? (TZ[m.country]||0) : 0; }
function tzShort(off){ return off===5.5?"IST":off===-3?"BRT":off===-6?"CST":off===1?"CET":"UTC"; }

/* Working-hours compatibility: everyone works 9:00-17:00 in their OWN timezone.
   Two people can only share a squad if those windows overlap (compared in UTC). */
var WORK_START = 9, WORK_END = 17;
var MIN_OVERLAP_HOURS = 1;                 // need at least 1h of shared working time
function workWindowUTC(name){ var off = tzOf(name); return [WORK_START - off, WORK_END - off]; }
function overlapHours(a,b){
  var wa = workWindowUTC(a), wb = workWindowUTC(b);
  return Math.min(wa[1], wb[1]) - Math.max(wa[0], wb[0]);
}
function tzCompatible(a,b){ return overlapHours(a,b) >= MIN_OVERLAP_HOURS; }

function presentPlayers(){

  });
}
function eligibleForGroups(){

}

/* ---------------- Presentation order ---------------- */
function buildOrder(){
  var present = presentPlayers();
  var rest = present.filter(function(n){ return n!=="Oliver" && n!=="Renzo"; });
  for(var i=rest.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=rest[i];rest[i]=rest[j];rest[j]=t; }
  var order = [];
  if(present.indexOf("Oliver")!==-1) order.push("Oliver");
  if(present.indexOf("Renzo")!==-1)  order.push("Renzo");
  return order.concat(rest);
}

/* ---------------- Grouping algorithm ---------------- */
function pairScore(a,b){
  var qa = sharedState.quiz[a], qb = sharedState.quiz[b], s = 0, i;
  if(qa && qb){
    var la = qa.a||[], lb = qb.a||[];
    var lim = Math.min(la.length, lb.length);
    for(i=0;i<lim;i++){ if(la[i]===lb[i]) s += 1; }
    if(qa.pillar===qb.pillar) s += 1;
  }
  // reward larger shared working-hours (timezone) overlap
  var ov = overlapHours(a,b);
  s += ov>=6 ? 4 : ov>=3 ? 3 : ov>=1 ? 1.5 : 0;
  return s;
}
function computeGroups(){
  // Everyone except the two coordinators can be in a squad (15 people).
  var all = TEAM.map(function(m){return m.name;}).filter(function(x){ return x!=="Oliver" && x!=="Renzo"; });
  var n = all.length;
  if(n===0) return [];

  // Split into those who answered the quiz vs. those who couldn't attend (no answers).
  var answered  = all.filter(function(x){ return sharedState.quiz && sharedState.quiz[x]; });
  var absentees = all.filter(function(x){ return !(sharedState.quiz && sharedState.quiz[x]); });

  function splitSizes(count){
    var base=Math.floor(count/3), rr=count%3;
    return [ base+(0<rr?1:0), base+(1<rr?1:0), base+(2<rr?1:0) ];
  }
  var sizes = splitSizes(n);   // final capacity per squad, e.g. [5,5,5]
  var groups = [[],[],[]];

  function pillarInGroup(gr,p){ return gr.some(function(x){ return sharedState.quiz[x] && sharedState.quiz[x].pillar===p; }); }

  // Place one person, never breaking the 9-17h overlap rule if a compatible squad still has room.
  function placeOne(person, useAffinity){
    var gi, anyCompatible=false;
    for(gi=0; gi<3; gi++){
      if(groups[gi].length >= sizes[gi]) continue;
      if(groups[gi].every(function(m){ return tzCompatible(person,m); })){ anyCompatible=true; break; }
    }
    var best=-1, bestScore=-1e9;
    for(gi=0; gi<3; gi++){
      if(groups[gi].length >= sizes[gi]) continue;
      var compatible = groups[gi].every(function(m){ return tzCompatible(person,m); });
      if(anyCompatible && !compatible) continue;      // respect the timezone rule whenever possible
      var sc = 0;
      groups[gi].forEach(function(m){
        sc += useAffinity ? pairScore(person,m) : Math.max(0, overlapHours(person,m));
      });
      if(useAffinity && sharedState.quiz[person] && !pillarInGroup(groups[gi], sharedState.quiz[person].pillar)) sc += 8; // strongly favour covering every pillar
      if(!useAffinity) sc += Math.random()*3;         // absentees: random among compatible squads
      if(!compatible) sc -= 1000;                      // last-resort penalty (only if unavoidable)
      if(sc > bestScore){ bestScore=sc; best=gi; }
    }
    if(best<0){ best=0; for(gi=1;gi<3;gi++){ if(groups[gi].length<groups[best].length) best=gi; } }
    groups[best].push(person);
  }

  function tzCount(name){ var t=tzOf(name); return all.filter(function(x){return tzOf(x)===t;}).length; }

  /* Phase 0 (Pillar draft): GUARANTEE that every squad gets at least one owner of
     each pillar that has enough supply, BEFORE we optimise for affinity. A pillar
     chosen by k people can reach min(k,3) squads; any shortfall is reported in the UI.
     This is what makes "a minimum of one member per pillar" a real guarantee (when the
     answers make it possible) instead of just a soft preference. */
  var drafted = {};
  (function draftPillars(){
    var byPillar = {};
    answered.forEach(function(name){
      var p = sharedState.quiz[name].pillar;
      if(typeof p !== "number") return;
      (byPillar[p] = byPillar[p] || []).push(name);
    });
    /* Scarcest pillars first so rare specialists claim squads before capacity fills. */
    var pillarIds = Object.keys(byPillar).map(Number).sort(function(a,b){
      return byPillar[a].length - byPillar[b].length;
    });
    pillarIds.forEach(function(p, order){
      var pool = byPillar[p].slice();
      pool.sort(function(a,b){ return tzCount(a)-tzCount(b); }); // scarce-timezone picks first
      /* Rotate the starting squad per pillar so single-supply pillars spread across squads. */
      for(var step=0; step<3 && pool.length; step++){
        var gi = (order + step) % 3;
        if(pillarInGroup(groups[gi], p)) continue;      // squad already covers this pillar
        if(groups[gi].length >= sizes[gi]) continue;    // squad already full
        var anyCompatible=false, k;
        for(k=0;k<pool.length;k++){
          if(groups[gi].every(function(m){return tzCompatible(pool[k],m);})){ anyCompatible=true; break; }
        }
        var bestIdx=-1, bestScore=-1e9;
        for(k=0;k<pool.length;k++){
          var cand=pool[k];
          var compatible = groups[gi].every(function(m){return tzCompatible(cand,m);});
          if(anyCompatible && !compatible) continue;    // keep timezone feasible when possible
          var sc=0; groups[gi].forEach(function(m){ sc += pairScore(cand,m); });
          if(!compatible) sc -= 1000;
          if(sc>bestScore){ bestScore=sc; bestIdx=k; }
        }
        if(bestIdx>=0){
          groups[gi].push(pool[bestIdx]);
          drafted[pool[bestIdx]] = true;
          pool.splice(bestIdx,1);
        }
      }
    });
  })();

  /* Phase A: remaining players who answered -> affinity + timezone.
     Rarest timezones first, so they claim compatible squads before the flexible ones. */
  answered.slice().filter(function(x){ return !drafted[x]; }).sort(function(a,b){
    var ra=tzCount(a), rb=tzCount(b);
    if(ra!==rb) return ra-rb;
    if(tzOf(a)!==tzOf(b)) return tzOf(a)-tzOf(b);
    return a<b?-1:1;
  }).forEach(function(p){ placeOne(p, true); });

  /* Phase B: people who couldn't attend -> timezone only, then random. */
  for(var s=absentees.length-1;s>0;s--){ var k=Math.floor(Math.random()*(s+1)); var tt=absentees[s]; absentees[s]=absentees[k]; absentees[k]=tt; }
  absentees.sort(function(a,b){ return tzCount(a)-tzCount(b); }).forEach(function(p){ placeOne(p, false); });

  /* Repair + optimise: remove any residual timezone clash first, then improve affinity.
     Pairs that involve an absentee only score on overlap, so they stay grouped purely by timezone. */
  function distinctPillars(gr){
    var seen={};
    gr.forEach(function(n){ var q=sharedState.quiz[n]; if(q && typeof q.pillar==="number") seen[q.pillar]=true; });
    return Object.keys(seen).length;
  }
  function cost(){
    var hard=0, soft=0, cover=0;
    groups.forEach(function(gr){
      for(var i=0;i<gr.length;i++){ for(var j=i+1;j<gr.length;j++){
        if(!tzCompatible(gr[i],gr[j])) hard++;
        soft += pairScore(gr[i],gr[j]);
      } }
      cover += distinctPillars(gr);        // total pillar coverage across squads
    });
    return { hard:hard, cover:cover, soft:soft };
  }
  var c = cost();
  for(var it=0; it<1500; it++){
    var A=Math.floor(Math.random()*3), B=Math.floor(Math.random()*3);
    if(A===B || !groups[A].length || !groups[B].length) continue;
    var ai=Math.floor(Math.random()*groups[A].length), bi=Math.floor(Math.random()*groups[B].length);
    var tmp=groups[A][ai]; groups[A][ai]=groups[B][bi]; groups[B][bi]=tmp;
    var nc=cost();
    /* Priority: (1) fewer timezone clashes, (2) never lose pillar coverage, (3) better affinity.
       Because coverage ranks above affinity, the optimiser can never undo the guaranteed
       one-per-pillar spread produced by the draft. */
    var accept = (nc.hard < c.hard)
      || (nc.hard===c.hard && nc.cover > c.cover)
      || (nc.hard===c.hard && nc.cover===c.cover && nc.soft > c.soft);
    if(accept){ c=nc; } else { var t2=groups[A][ai]; groups[A][ai]=groups[B][bi]; groups[B][bi]=t2; }
  }

  return groups.filter(function(gr){ return gr.length>0; });
}

/* ---------------- Render ---------------- */
var app = document.getElementById("app");

function setHeader(){
  var sub = document.getElementById("subtitle");
  var barWrap = document.querySelector(".bar");
  var bar = document.getElementById("progressBar");
  var label = document.getElementById("progressLabel");
  var total = TEAM.length, inCount = sharedState.checkedIn.length + sharedState.absent.length;

  if(sharedState.phase==="checkin"){
    barWrap.style.display=""; sub.textContent="Check in from your device to join the session";
    bar.style.width = Math.round(inCount/total*100)+"%";
    label.textContent = inCount+" / "+total+" checked in";
  } else if(sharedState.phase==="presentations"){
    barWrap.style.display="";
    var order=sharedState.order, idx=sharedState.currentIndex;
    sub.textContent="Introductions in progress \u00B7 90 seconds each";
    bar.style.width = Math.round((idx)/(order.length)*100)+"%";
    label.textContent = "Speaker "+Math.min(idx+1,order.length)+" / "+order.length;
  } else if(sharedState.phase==="quiz"){
    barWrap.style.display="";
    var players=presentPlayers();
    var answered=players.filter(function(n){return sharedState.quiz[n];}).length;
    sub.textContent="Phase 2 \u00B7 Find your squad";
    bar.style.width = players.length?Math.round(answered/players.length*100)+"%":"0%";
    label.textContent = answered+" / "+players.length+" answered";
  } else if(sharedState.phase==="groups"){
    barWrap.style.display="none"; sub.textContent="Phase 2 \u00B7 Your squads are ready";
    label.textContent="";
  } else {
    barWrap.style.display="none"; sub.textContent="Introductions complete";
    label.textContent="";
  }
}

function render(){
  setHeader();
  if(sharedState.phase==="presentations")      renderPresentations();
  else if(sharedState.phase==="introDone")      renderIntroDone();
  else if(sharedState.phase==="quiz")           renderQuiz();
  else if(sharedState.phase==="groups")         renderGroups();
  else                                          renderCheckin();
  restartTicker();
}

/* --- Check-in --- */
function renderCheckin(){
  var renzoView = isRenzo();
  var html = '<div class="grid">';
  TEAM.forEach(function(member){
    var isIn = sharedState.checkedIn.indexOf(member.name)!==-1;
    var isAbsent = sharedState.absent.indexOf(member.name)!==-1;
    var isMe = deviceState.myName===member.name;
    var cls = "card" + ((isIn || isAbsent)?" in":"") + ((isAbsent && !renzoView)?" absent":"") + (renzoView?" has-mark":"");
    html += '<div class="'+cls+'" data-action="checkin" data-name="'+member.name+'">';
    html += '<div class="check">\u2713</div>';
    if(isMe) html += '<div class="me-tag">You</div>';
    html += flagHTML(member, 26, 60);
    html += '<div class="card-name"><span>'+member.name+'</span></div>';
    html += '<div class="card-country">'+member.country+'</div>';
    if(renzoView){
      html += '<button class="mark-absent'+(isAbsent?' is-absent':'')+'" data-action="toggle-absent" data-name="'+member.name+'">'+
              (isAbsent?'\u2713 Couldn\u2019t attend':'Mark absent')+'</button>';
    } else if(isAbsent){
      html += '<div class="absent-tag">Absent</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  if(deviceState.myName){
    html += '<div class="pick-note">You are checked in as '+deviceState.myName+
            ' \u2013 tap your card again to undo.</div>';
  } else {
    html += '<div class="hint">Tap your name to check in. Do this on your own device.</div>';
  }

  html += '<div class="actions">';
  if(isHostController()){
    var present = presentPlayers().length;
    html += '<button class="btn-primary" data-action="start"'+(present<1?' disabled':'')+'>Start introductions \u2192</button>';
  } else if(isRenzo()){
    html += '<button class="btn-teal btn-sm" data-action="unlock-host">Unlock Renzo host controls</button>';
  }
  if(canDemo()){
    html += '<button class="btn-ghost btn-sm" data-action="demo">Demo mode</button>';
  }
  if(isHostController()){
    html += '<button class="btn-ghost btn-sm" data-action="lock-host">Lock host controls</button>';
  }
  if(deviceState.myName){
    html += '<button class="btn-ghost btn-sm" data-action="reset-device">Not me / switch</button>';
  }
  html += '</div>';

  if(isHostController()){
    html += '<div class="hint">Renzo: tap <b>Mark absent</b> on anyone who couldn\u2019t attend. '+
            'They skip the intros and the quiz, but still get placed in a final squad by timezone.</div>';
  } else if(isRenzo()){
    html += '<div class="hint">Renzo: unlock host controls to drive the session globally.</div>';
  }
  app.innerHTML = html;
}

/* --- Presentations --- */
var ticker = null;
function restartTicker(){
  if(ticker){ clearInterval(ticker); ticker=null; }
  if(sharedState.phase!=="presentations") return;
  ticker = setInterval(function(){ updateTimer(); }, 250);
  updateTimer();
}
function currentSpeaker(){ return sharedState.order[sharedState.currentIndex]; }
function elapsedSeconds(){
  if(!sharedState.startedAt) return 0;
  return Math.floor((Date.now()-sharedState.startedAt)/1000);
}
function updateTimer(){
  var el = document.getElementById("timer");
  var ring = document.getElementById("timerRing");
  if(!el) return;
  var remaining = PRESENTATION_SECONDS - elapsedSeconds();
  if(remaining<0) remaining=0;
  var m = Math.floor(remaining/60), s = remaining%60;
  el.textContent = m+":"+(s<10?"0":"")+s;
  var pct = Math.max(0, remaining/PRESENTATION_SECONDS*100);
  var color = remaining<=5 ? "#ff4d4d" : remaining<=20 ? "#f5a524" : "#32B9AF";
  el.style.color = color;
  if(ring){ ring.style.width = pct+"%"; ring.style.background = color; }

  // Renzo host device auto-advances every 90s so all screens stay aligned.
  if(isHostController() && elapsedSeconds() >= PRESENTATION_SECONDS){
    if(sharedState.currentIndex < sharedState.order.length-1){
      sharedState.currentIndex++;
      sharedState.startedAt = Date.now();
      saveShared();
      render();
    } else {
      sharedState.phase = "introDone";
      saveShared();
      render();
    }
  }
}
function renderPresentations(){
  var speaker = currentSpeaker();
  var member = memberByName(speaker);
  var html = '<div class="stage">';
  html += '<div class="now">Now presenting</div>';
  html += '<div class="stage-card">';
  html += flagInlineBlock(member);
  html += '<div class="stage-name">'+member.name+'</div>';
  html += '<div class="stage-country">'+member.country+'</div>';
  html += '<div class="timer" id="timer">1:30</div>';
  html += '<div class="timer-ring"><div id="timerRing"></div></div>';
  html += '</div>';

  html += '<div class="queue">';
  sharedState.order.forEach(function(n,i){
    var cls = "chip" + (i<sharedState.currentIndex?" done":"") + (i===sharedState.currentIndex?" current":"");
    var mm = memberByName(n);
    html += '<span class="'+cls+'">'+flagInline(mm,12,40)+' '+n+'</span>';
  });
  html += '</div>';

  if(isHostController()){
    html += '<div class="actions">';
    html += '<button class="btn-ghost btn-sm" data-action="prev"'+(sharedState.currentIndex===0?' disabled':'')+'>\u2190 Prev</button>';
    if(sharedState.currentIndex < sharedState.order.length-1){
      html += '<button class="btn-primary" data-action="next">Next speaker \u2192</button>';
    } else {
      html += '<button class="btn-teal" data-action="finish">Finish introductions \u2713</button>';
    }
    html += '</div>';
  } else {
    html += '<div class="hint">Renzo controls the session globally.</div>';
  }
  html += '</div>';
  app.innerHTML = html;
  updateTimer();
}
function flagInlineBlock(member){
  return '<img class="stage-flag" src="https://flagcdn.com/h120/'+member.code+'.png" '+
         'height="90" style="height:90px;width:auto" data-code="'+member.code+'" data-h="90" '+
         'alt="'+member.country+'" onerror="window.flagFail(this)">';
}

/* --- Intro done --- */
function renderIntroDone(){
  var absent = sharedState.absent;
  var html = '<div class="celebrate">';
  html += '<div class="big">\u{1F389}</div>';
  html += '<h2>All introductions done!</h2>';
  html += '<p>Great to meet everyone. Ready for <b>Phase 2</b>? '+
          'Answer a few fun questions \u2013 just <b>tap the photo you prefer</b> \u2013 '+

    html += '<div class="hint">Waiting for Renzo to start Phase 2\u2026</div>';
  }

    html += '<div class="absent-bar">';

}

/* --- Quiz --- */
function renderQuiz(){
  var me = deviceState.myName;
  var iAnswered = me && sharedState.quiz[me];
  var iAmCoordinator = (me==="Oliver" || me==="Renzo"); // may play for fun; answers ignored for squads
  /* Progress is measured only over squad-eligible players (the 15). Oliver & Renzo can
     play Phase 2 to choose, but their answers never shape the final squads, so they do
     not count toward "ready to reveal". */
  var players = eligibleForGroups();
  var answered = players.filter(function(n){ return sharedState.quiz[n]; });
  var totalSteps = QUIZ.length + 1; // + pillar
  preloadAllQuizImages();           // warm the cache so every question appears instantly
  var html = '<div class="quiz-wrap">';

  if(me && !iAnswered){
    if(myQuiz.idx < QUIZ.length){
      var q = QUIZ[myQuiz.idx];
      html += '<div class="q-num">Question '+(myQuiz.idx+1)+' of '+totalSteps+'</div>';
      html += '<div class="quiz-qtext">'+q.q+'</div>';
      html += '<div class="quiz-split">';
      html += optionPane(q.a, 0);
      html += '<div class="qpane-vs">VS</div>';
      html += optionPane(q.b, 1);
      html += '</div>';
      html += '<div class="tap-hint">\u{1F446} Tap the side you prefer</div>';
    } else {
      html += '<div class="q-num">Final question \u00B7 pick your pillar</div>';
      html += '<div class="q-card">';
      html += '<div class="q-title">Last one \u2013 where does your heart truly belong? \u{1F49C}</div>';
      html += '<div class="q-opts">';
      PILLARS.forEach(function(p,i){
        html += '<button class="q-opt pillar-opt" data-action="quiz-pillar" data-choice="'+i+'" style="border-left:4px solid '+p.color+'">'+
                '<span class="p-head"><span class="q-emoji">'+p.emoji+'</span>'+p.name+'</span>'+
                '<span class="p-sub">'+p.sub+'</span></button>';
      });
      html += '</div>';
      html += '<div class="pillar-hint">'+(iAmCoordinator
          ? '\u{1F49C} Just for fun \u2013 as a coordinator your pick won\u2019t affect the squads.'
          : '\u{1F91D} Pick honestly \u2013 every squad needs at least one person per pillar, so your choice shapes the teams.')+'</div>';
      html += '</div>';
    }
    var pct = Math.round(myQuiz.idx/totalSteps*100);
    html += '<div class="q-progress"><div style="width:'+pct+'%"></div></div>';
    if(myQuiz.idx>0){
      html += '<div class="q-back"><button class="btn-ghost btn-sm" data-action="quiz-back">\u2190 Back</button></div>';
    }
  } else if(me && iAnswered){
    html += '<div class="wait-card">';
    html += '<div class="wait-emoji">\u2705</div>';
    html += '<h2>Thanks, '+me+'!</h2>';
    html += (iAmCoordinator
      ? '<p>Your picks are in \u2013 just for fun! As a coordinator, your answers don\u2019t shape the squads.</p>'
      : '<p>Your answers are in. Sit tight while the rest of the team finishes\u2026</p>');
    html += '<p style="margin-top:10px;color:#32B9AF;font-weight:600">'+answered.length+' / '+players.length+' players ready</p>';
    html += '</div>';
  } else {
    html += '<div class="wait-card"><div class="wait-emoji">\u{1F440}</div>'+
            '<h2>Phase 2 in progress</h2><p>Check in on your device to play.</p></div>';
  }

  if(canDemo()){
    var absentCount = sharedState.absent.filter(function(n){ return n!=="Oliver" && n!=="Renzo"; }).length;
    html += '<div class="admin-panel">';
    html += '<div class="ap-title">Renzo \u00B7 host controls</div>';
    html += '<div class="ap-progress"><b>'+answered.length+'</b> of <b>'+players.length+'</b> squad players answered'+
            (absentCount?(' \u00B7 <b>'+absentCount+'</b> couldn\u2019t attend (auto-placed by timezone)'):'')+'</div>';
    html += '<div class="actions" style="margin-top:0">';
    if(isHostController()) html += '<button class="btn-primary" data-action="reveal-groups">Reveal squads \u2192</button>';
    html += '<button class="btn-ghost btn-sm" data-action="demo-quiz">Demo \u00B7 fill all &amp; show squads</button>';
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';
  app.innerHTML = html;
}

/* --- Groups --- */
function renderGroups(){
  var groups = sharedState.groups || [];
  var html = '';
  var names = ["Squad 1","Squad 2","Squad 3"];

  html += '<div class="section-label">\u{1F91D} Your squads for the mission</div>';

  /* Team-wide pillar coverage \u2013 make sure every chosen pillar has at least one owner */
  var teamPillars = [0,0,0];
  groups.forEach(function(gr){ gr.forEach(function(n){ var q=sharedState.quiz[n]; if(q && typeof q.pillar==="number") teamPillars[q.pillar]++; }); });
  var allCovered = teamPillars.every(function(c){ return c>0; });
  html += '<div class="coverage '+(allCovered?'cov-ok':'cov-warn')+'">';
  html += '<div class="cov-head">'+(allCovered
      ? '\u2705 Pillar coverage \u00B7 every pillar has at least one owner on the team'
      : '\u26A0\uFE0F Pillar coverage \u00B7 make sure every pillar has at least one owner')+'</div>';
  html += '<div class="cov-badges">';
  PILLARS.forEach(function(p,i){
    var c = teamPillars[i], ok = c>0;
    html += '<span class="cov-badge"'+(ok?' style="color:'+p.color+';border-color:'+p.color+'66;background:'+p.color+'1a"':'')+'>'+
            (ok?'\u2713 ':'\u2717 ')+p.emoji+' '+p.tag+' <b>\u00D7'+c+'</b></span>';
  });
  html += '</div></div>';

  html += '<div class="groups">';
  groups.forEach(function(gr, gi){
    var offs = {};
    gr.forEach(function(n){ offs[tzOf(n)] = true; });
    var tzList = Object.keys(offs).map(function(o){ return tzShort(parseFloat(o)); });
    var pillarCount = [0,0,0];
    gr.forEach(function(n){ var p=sharedState.quiz[n]; if(p && typeof p.pillar==="number") pillarCount[p.pillar]++; });

    html += '<div class="group-card g'+gi+'">';
    html += '<div class="group-head"><div class="group-title">'+(names[gi]||("Squad "+(gi+1)))+'</div>'+
            '<div class="group-tz">'+tzList.join(" \u00B7 ")+'</div></div>';
    gr.forEach(function(n){
      var m = memberByName(n);
      var wasAbsent = sharedState.absent.indexOf(n)!==-1;
      var q = sharedState.quiz[n];
      var pill = (q && typeof q.pillar==="number") ? PILLARS[q.pillar] : null;
      var pillTag = pill
        ? '<span class="m-pill" title="'+pill.name+'" style="color:'+pill.color+';border-color:'+pill.color+'66;background:'+pill.color+'1a">'+pill.emoji+'</span>'
        : '<span class="m-pill m-pill-none" title="No pillar \u00B7 couldn\u2019t attend">\u2013</span>';
      html += '<div class="member">'+flagInline(m,22,60)+
              '<div class="m-info"><span class="m-name">'+m.name+(wasAbsent?'<span class="m-absent-tag">absent</span>':'')+'</span>'+
              '<span class="m-country">'+m.country+'</span></div>'+
              '<span class="m-right">'+pillTag+'<span class="m-tz">'+tzShort(tzOf(n))+'</span></span></div>';
    });
    var missing = [];
    PILLARS.forEach(function(p,i){ if(pillarCount[i]===0) missing.push({p:p,i:i}); });
    var covered = PILLARS.length - missing.length;
    html += '<div class="pillar-split-label">This squad \u00B7 '+covered+'/'+PILLARS.length+' pillars covered</div>';
    html += '<div class="pillars">';
    PILLARS.forEach(function(p,i){
      var c = pillarCount[i];
      html += '<span class="pbadge'+(c>0?' on':'')+'"'+(c>0?' style="color:'+p.color+';border-color:'+p.color+'66;background:'+p.color+'1a"':'')+'>'+
              p.emoji+' '+p.tag+' <b>\u00D7'+c+'</b></span>';
    });
    html += '</div>';
    if(!missing.length){
      html += '<div class="cover-note ok">\u2705 Every pillar has at least one owner</div>';
    } else {
      /* Distinguish "nobody chose it" from "scarce pillar, owned by another squad". */
      var noSupply = missing.filter(function(m){ return teamPillars[m.i]===0; }).map(function(m){ return m.p.tag; });
      var elsewhere = missing.filter(function(m){ return teamPillars[m.i]>0; }).map(function(m){ return m.p.tag; });
      var msg = [];
      if(noSupply.length)  msg.push('\u26A0\uFE0F Missing '+noSupply.join(", ")+' \u2013 no one picked it');
      if(elsewhere.length) msg.push('\u2139\uFE0F '+elsewhere.join(", ")+' \u2013 limited picks, covered in another squad');
      html += '<div class="cover-note '+(noSupply.length?'miss':'ok')+'">'+msg.join('<br>')+'</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  /* Coordinators */
  var coords = ["Oliver","Renzo"].filter(function(n){ return presentPlayers().indexOf(n)!==-1; });
  if(coords.length){
    html += '<div class="section-label">\u2B50 Coordinators \u00B7 guiding every squad</div>';
    html += '<div class="coord">';
    coords.forEach(function(n){
      var m = memberByName(n);
      html += '<div class="coord-card">'+flagInline(m,24,60)+
              '<div><div class="coord-name">'+m.name+'</div>'+
              '<div class="coord-role">Coordinator</div></div></div>';
    });
    html += '</div>';
  }

  if(isHostController()){
    html += '<div class="actions" style="flex-direction:column;gap:8px;align-items:stretch">';
    html += '<button class="btn-teal btn-sm" data-action="email-results">\u{1F4E5} Download squads (HTML)</button>';
    html += '<div id="emailStatus" class="hint" style="margin:0;text-align:center">'+emailStatusText()+'</div>';
    html += '<button class="btn-ghost btn-sm" data-action="reset">Restart session</button>';
    html += '</div>';
  }
  app.innerHTML = html;
  maybeAutoEmail();   // host device auto-saves the self-contained HTML summary once per reveal
}

/* ---------------- Export the squad results (self-contained HTML, zero third parties) ---------------- */
var emailState = "idle";   // idle | saved
function mailEsc(s){
  return String(s).replace(/[&<>"]/g, function(c){
    return c==="&"?"&amp;":c==="<"?"&lt;":c===">"?"&gt;":"&quot;";
  });
}
function emailStatusText(){
  if(emailState==="saved") return "\u2705 Squads saved as eas-coe-squads.html \u2013 attach it to Renzo\u2019s email (nothing was sent anywhere)";
  return "\u2B07\uFE0F Tap to download the squads as a self-contained HTML file \u2013 zero third parties, no data leaves your browser";
}
function setEmailStatus(s){
  emailState = s;
  var el = document.getElementById("emailStatus");
  if(el) el.textContent = emailStatusText();
}

function pillarBadgeEmail(i, count){
  var p = PILLARS[i];
  return '<span style="display:inline-block;margin:2px 5px 2px 0;padding:3px 9px;border-radius:12px;font-size:12px;'+
         'color:'+p.color+';border:1px solid '+p.color+'66;background:'+p.color+'1a">'+p.emoji+' '+mailEsc(p.tag)+' &#215;'+count+'</span>';
}

/* Full inline-styled, table-based HTML body – renders nicely inside email clients. */
function buildSquadEmailBody(){
  var groups = sharedState.groups || [];
  var names = ["Squad 1","Squad 2","Squad 3"];
  var teamPillars = [0,0,0];
  groups.forEach(function(gr){ gr.forEach(function(n){ var q=sharedState.quiz[n]; if(q&&typeof q.pillar==="number") teamPillars[q.pillar]++; }); });
  var allCovered = teamPillars.every(function(c){ return c>0; });

  var H = '';
  H += '<div style="background:#0e0e12;padding:24px 12px;font-family:Arial,Helvetica,sans-serif">';
  H += '<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr><td align="center">';
  H += '<table role="presentation" width="640" cellpadding="0" cellspacing="0" style="max-width:640px;width:100%"><tr><td>';

  H += '<div style="text-align:center;margin-bottom:18px">';
  H += '<div style="font-size:12px;letter-spacing:2px;color:#E20074;font-weight:700">EAS AUTOMATION CENTER OF EXCELLENCE</div>';
  H += '<div style="font-size:26px;font-weight:800;color:#ffffff;margin-top:6px">\uD83E\uDD1D Final Squads</div>';
  H += '<div style="font-size:13px;color:#9a9aa8;margin-top:2px">Kickoff \u00B7 '+mailEsc(new Date().toLocaleString())+'</div>';
  H += '</div>';

  H += '<div style="border-radius:12px;padding:12px 14px;margin-bottom:16px;background:'+(allCovered?'#0f2a22':'#2a220f')+';border:1px solid '+(allCovered?'#1f7a5f':'#7a5f1f')+'">';
  H += '<div style="font-size:14px;font-weight:700;color:'+(allCovered?'#38ef7d':'#f5c518')+'">'+
       (allCovered?'\u2705 Every pillar has at least one owner on the team':'\u26A0\uFE0F Some pillars have no owner yet')+'</div>';
  H += '<div style="margin-top:8px">';
  PILLARS.forEach(function(p,i){ H += pillarBadgeEmail(i, teamPillars[i]); });
  H += '</div></div>';

  groups.forEach(function(gr, gi){
    var offs={}; gr.forEach(function(n){ offs[tzOf(n)]=true; });
    var tzList = Object.keys(offs).map(function(o){ return tzShort(parseFloat(o)); }).join(" \u00B7 ");
    var pc=[0,0,0]; gr.forEach(function(n){ var q=sharedState.quiz[n]; if(q&&typeof q.pillar==="number") pc[q.pillar]++; });

    H += '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:14px;border-radius:14px;border:1px solid #23232b;background:#15151b"><tr><td style="padding:14px 16px">';
    H += '<table role="presentation" width="100%"><tr>'+
         '<td style="font-size:18px;font-weight:800;color:#ffffff">'+mailEsc(names[gi]||("Squad "+(gi+1)))+'</td>'+
         '<td align="right" style="font-size:12px;color:#8ab4c8;font-weight:700">'+mailEsc(tzList)+'</td></tr></table>';

    gr.forEach(function(n){
      var m=memberByName(n);
      var wasAbsent = sharedState.absent.indexOf(n)!==-1;
      var q=sharedState.quiz[n];
      var pill=(q&&typeof q.pillar==="number")?PILLARS[q.pillar]:null;
      H += '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-top:9px"><tr>';
      H += '<td width="30" valign="middle"><img src="https://flagcdn.com/h40/'+m.code+'.png" height="20" style="height:20px;width:auto;border-radius:2px" alt="'+mailEsc(m.country)+'"></td>';
      H += '<td valign="middle" style="color:#ffffff;font-size:15px;font-weight:600">'+mailEsc(m.name)+
           (wasAbsent?' <span style="font-size:10px;color:#f5a524;border:1px solid #f5a52466;border-radius:8px;padding:1px 6px">absent</span>':'')+
           '<div style="font-size:11px;color:#8a8a99;font-weight:400">'+mailEsc(m.country)+'</div></td>';
      H += '<td valign="middle" align="right" style="white-space:nowrap">'+
           (pill?'<span style="font-size:12px;color:'+pill.color+';border:1px solid '+pill.color+'66;background:'+pill.color+'1a;border-radius:10px;padding:2px 8px">'+pill.emoji+' '+mailEsc(pill.tag)+'</span>':'<span style="font-size:12px;color:#777">\u2013</span>')+
           ' <span style="font-size:11px;color:#8ab4c8;font-weight:700">'+mailEsc(tzShort(tzOf(n)))+'</span></td>';
      H += '</tr></table>';
    });

    var covered = [0,1,2].filter(function(i){ return pc[i]>0; }).length;
    H += '<div style="margin-top:12px;font-size:12px;color:#9a9aa8">This squad \u00B7 '+covered+'/3 pillars covered</div>';
    H += '<div style="margin-top:5px">';
    PILLARS.forEach(function(p,i){ H += pillarBadgeEmail(i, pc[i]); });
    H += '</div>';
    H += '</td></tr></table>';
  });

  var coords = ["Oliver","Renzo"].filter(function(n){ return presentPlayers().indexOf(n)!==-1; });
  if(coords.length){
    H += '<div style="font-size:12px;letter-spacing:1px;color:#E20074;font-weight:700;margin:6px 0 8px">\u2B50 COORDINATORS</div>';
    coords.forEach(function(n){ var m=memberByName(n);
      H += '<table role="presentation" cellpadding="0" cellspacing="0" style="display:inline-table;margin:0 8px 8px 0;border:1px solid #23232b;border-radius:10px;background:#15151b"><tr>'+
           '<td style="padding:8px 12px"><img src="https://flagcdn.com/h40/'+m.code+'.png" height="18" style="height:18px;width:auto;border-radius:2px;vertical-align:middle" alt="'+mailEsc(m.country)+'"> '+
           '<span style="color:#ffffff;font-weight:600;font-size:14px;vertical-align:middle">'+mailEsc(m.name)+'</span> '+
           '<span style="color:#8a8a99;font-size:11px;vertical-align:middle">Coordinator</span></td></tr></table>';
    });
  }

  H += '<div style="text-align:center;color:#55555f;font-size:11px;margin-top:18px">Generated automatically by the EAS CoE Kickoff app</div>';
  H += '</td></tr></table></td></tr></table></div>';
  return H;
}

function buildSquadEmailDoc(){
  return '<!doctype html><html><head><meta charset="utf-8">'+
         '<meta name="viewport" content="width=device-width,initial-scale=1">'+
         '<title>'+mailEsc(EMAIL_CFG.subject)+'</title></head>'+
         '<body style="margin:0">'+buildSquadEmailBody()+'</body></html>';
}
function downloadEmailHtml(){
  try {
    var blob = new Blob([buildSquadEmailDoc()], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "eas-coe-squads.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
  } catch(e){}
}
/* Zero third parties: build a self-contained HTML file of the final squads and download it
   locally. NOTHING is ever sent to any external service - no email API, no keys, no tracking,
   no data leaves the browser. Renzo then attaches/forwards this file per corporate policy. */
function sendSquadEmail(interactive){
  if(!sharedState.groups || !sharedState.groups.length){
    if(interactive) alert("Reveal the squads first.");
    return;
  }
  downloadEmailHtml();
  setEmailStatus("saved");
}

function groupsSignature(){
  try { return JSON.stringify(sharedState.groups||[]); } catch(e){ return String(Date.now()); }
}
/* On Renzo's host device, auto-save the HTML summary once per revealed squad set. It runs
   right after the host taps "Reveal squads" (a user gesture, so the browser allows the
   download). Zero third parties - the file simply lands in Renzo's Downloads folder. */
function maybeAutoEmail(){
  if(!isHostController() || sharedState.phase!=="groups") return;
  var sig = groupsSignature();
  if(deviceState.emailSig === sig) return;     // already saved these squads on this device
  deviceState.emailSig = sig;
  saveDevice();
  downloadEmailHtml();
  setEmailStatus("saved");
}

/* ---------------- Actions ---------------- */
function handleAction(e){
  var el = e.target.closest("[data-action]");
  if(!el) return;
  var action = el.getAttribute("data-action");

  // Host-only controls: only Renzo can drive the real session (next speaker, move to Phase 2, etc.)
  var hostOnly = ["start","prev","next","finish","go-quiz","reveal-groups","email-results","reset"];
  if(hostOnly.indexOf(action)!==-1 && !isHostController()) return;
  // Demo shortcuts can be used by unlocked Renzo host only.
  var demoActions = ["demo","demo-quiz"];
  if(demoActions.indexOf(action)!==-1 && !canDemo()) return;

  if(action==="unlock-host"){
    if(!isRenzo()) return;
    var entered = prompt("Renzo host unlock (password)", "");
    if(!entered) return;
    verifyHostPassword(entered.trim()).then(function(isValid){
      if(isValid){
        deviceState.hostUnlocked = true;
        saveDevice();
        render();
      } else {
        alert("Host unlock failed.");
      }
    });
    return;
  }

  if(action==="lock-host"){
    deviceState.hostUnlocked = false;
    saveDevice();
    render();
    return;
  }

  if(action==="checkin"){
    var name = el.getAttribute("data-name");
    if(isRenzo() && e.shiftKey){
      var ia = sharedState.absent.indexOf(name);
      if(ia===-1){ sharedState.absent.push(name); var ci0=sharedState.checkedIn.indexOf(name); if(ci0!==-1) sharedState.checkedIn.splice(ci0,1); }
      else { sharedState.absent.splice(ia,1); }
      saveShared(); render(); return;
    }
    if(deviceState.myName && deviceState.myName!==name){
      alert("This device is already checked in as "+deviceState.myName+". Tap \"Not me / switch\" first.");
      return;
    }
    var idx = sharedState.checkedIn.indexOf(name);
    if(idx===-1){
      sharedState.checkedIn.push(name);
      deviceState.myName = name;
      if(name!=="Renzo") deviceState.hostUnlocked = false;
      var ab = sharedState.absent.indexOf(name); if(ab!==-1) sharedState.absent.splice(ab,1);
    } else {
      sharedState.checkedIn.splice(idx,1);
      if(deviceState.myName===name){
        deviceState.myName=null;
        deviceState.hostUnlocked=false;
      }
    }
    saveShared(); saveDevice(); render(); return;
  }

  if(action==="toggle-absent"){
    if(!isHostController()) return;
    var an = el.getAttribute("data-name");
    var ai2 = sharedState.absent.indexOf(an);
    if(ai2===-1){
      sharedState.absent.push(an);
      var ci = sharedState.checkedIn.indexOf(an); if(ci!==-1) sharedState.checkedIn.splice(ci,1);
    } else {
      sharedState.absent.splice(ai2,1);
    }
    saveShared(); render(); return;
  }

  if(action==="reset-device"){
    if(deviceState.myName){
      var idxIn = sharedState.checkedIn.indexOf(deviceState.myName);
      if(idxIn!==-1) sharedState.checkedIn.splice(idxIn,1);
      var idxAbsent = sharedState.absent.indexOf(deviceState.myName);
      if(idxAbsent!==-1) sharedState.absent.splice(idxAbsent,1);
      saveShared();
    }
    deviceState.myName=null;
    deviceState.hostUnlocked=false;
    saveDevice();
    render();
    return;
  }

  if(action==="start"){
    sharedState.order = buildOrder();
    sharedState.currentIndex = 0;
    sharedState.startedAt = Date.now();
    sharedState.phase = "presentations";
    saveShared(); render(); return;
  }

  if(action==="demo"){
    sharedState.checkedIn = TEAM.map(function(m){return m.name;});
    sharedState.absent = [];
    deviceState.myName = "Renzo";
    deviceState.presentationDemo = true;
    sharedState.order = buildOrder();
    sharedState.currentIndex = 0;
    sharedState.startedAt = Date.now();
    sharedState.phase = "presentations";
    deviceState.hostUnlocked = true;
    saveShared(); saveDevice(); render(); return;
  }

  if(action==="prev"){
    if(sharedState.currentIndex>0){ sharedState.currentIndex--; sharedState.startedAt=Date.now(); saveShared(); render(); }
    return;
  }
  if(action==="next"){
    if(sharedState.currentIndex < sharedState.order.length-1){
      sharedState.currentIndex++; sharedState.startedAt=Date.now(); saveShared(); render();
    }
    return;
  }
  if(action==="finish"){ sharedState.phase="introDone"; saveShared(); render(); return; }

  if(action==="go-quiz"){
    sharedState.phase="quiz";
    if(!sharedState.quiz) sharedState.quiz={};
    myQuiz = { idx:0, answers:[], pillar:null };
    saveShared(); render(); return;
  }

  if(action==="answer"){
    var c = parseInt(el.getAttribute("data-choice"),10);
    myQuiz.answers[myQuiz.idx] = c;
    myQuiz.idx++;
    render(); return;
  }
  if(action==="quiz-back"){
    if(myQuiz.idx>0) myQuiz.idx--;
    render(); return;
  }
  if(action==="quiz-pillar"){
    var p = parseInt(el.getAttribute("data-choice"),10);
    myQuiz.pillar = p;
    sharedState.quiz[deviceState.myName] = { a: myQuiz.answers.slice(), pillar: p };
    saveShared(); render(); return;
  }

  if(action==="demo-quiz"){
    var players = presentPlayers();
    players.forEach(function(n){
      if(sharedState.quiz[n]) return;
      var a = QUIZ.map(function(){ return Math.floor(Math.random()*2); });
      sharedState.quiz[n] = { a:a, pillar: Math.floor(Math.random()*PILLARS.length) };
    });
    sharedState.groups = computeGroups();
    sharedState.phase = "groups";
    saveShared(); render(); return;
  }

  if(action==="reveal-groups"){
    sharedState.groups = computeGroups();
    sharedState.phase = "groups";
    saveShared(); render(); return;
  }

  if(action==="email-results"){ sendSquadEmail(true); return; }

  if(action==="reset"){
    if(confirm("Restart the whole session for everyone?")){
      sharedState = defaultState();
      deviceState.myName = null;
      myQuiz = { idx:0, answers:[], pillar:null };
      saveShared(); saveDevice(); render();
    }
    return;
  }
}

/* ---------------- Sync ---------------- */
function pollShared(){
  /* MQTT push keeps every device live; this only covers same-device fallback
     (custom backend or localStorage) in case the broker is briefly unreachable. */
  var raw = null;
  try { if(hasBackend()) raw = window.storage.getItem(SHARED_KEY); } catch(e){}
  if(!raw){ try { raw = localStorage.getItem(SHARED_KEY); } catch(e){} }
  if(!raw) return;
  applyIncomingSharedRaw(raw);
}

/* ---------------- Boot ---------------- */
loadDevice();
loadShared();
setSyncStatus("connecting");
initRealtime();
document.addEventListener("click", handleAction);
window.addEventListener("storage", function(e){
  if(e && e.key===SHARED_KEY && e.newValue) applyIncomingSharedRaw(e.newValue);
});
render();
setInterval(pollShared, 500);
</script>
